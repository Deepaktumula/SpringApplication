name: Hello Spring Boot App to AWS EKS

on: [workflow_dispatch]
#  push:
#    branches:
#      - master
#    paths:
#      - .

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set-up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and Test (Maven)
        run: mvn -B clean verify

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set-up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR for Docker
        run: mvn -B clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springapplication:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springapplication:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/springapplication:${{ github.ref_name }}

  deploy-aws-eks:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Update Kubeconfig for AWS EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.AWS_CLUSTER_NAME }} --region ap-south-1

      - name: Verify the connection to AWS EKS
        run: kubectl get nodes

      - name: Deploy new image to EKS
        run: |
          kubectl apply -f app.yml
          
          kubectl set image deployment/springapplication \
            springapplication=${{ secrets.DOCKERHUB_USERNAME }}/springapplication:${{ github.sha }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/springapplication
          kubectl get pods